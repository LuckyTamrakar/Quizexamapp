{% extends "user/index.html" %} {% load crispy_forms_tags %} {% block start %}
<style>
    .button {
        background-color: rgb(241, 87, 87);
        border: 1px solid white;
        font-size: 15px;
        font-weight: bold;
        width: 155px;
        height: 50px;
    }
    
    .head6 {
        color: #EF4926;
        font-size: 3rem;
        font-weight: bold;
    }
    
    .a img {
        width: 40px;
        height: 40px;
        position: absolute;
        top: 0%;
    }
    
    .button:hover {
        background-color: greenyellow;
    }
    
    .icon-bar {
        position: fixed;
        top: 90%;
        left: 90%;
        -webkit-transform: translateY(-50%);
        -ms-transform: translateY(-50%);
        transform: translateY(-50%);
    }
    
    .icon-bar a {
        display: block;
        text-align: center;
        padding: 16px;
        transition: all 0.3s ease;
        color: white;
        font-size: 20px;
    }
    
    .icon-bars {
        position: fixed;
        top: 90%;
        left: 0%;
        -webkit-transform: translateY(-50%);
        -ms-transform: translateY(-50%);
        transform: translateY(-50%);
    }
    
    .icon-bars a {
        display: block;
        text-align: center;
        padding: 16px;
        transition: all 0.3s ease;
        color: white;
        font-size: 20px;
    }
    
    .form {
        color: white;
        border: 2px solid white;
    }
    
    .form input {
        color: black;
    }
    
    .copy p {
        text-align: center;
    }
    
    .copy li {
        display: inline-block;
        margin: 5px;
        justify-content: center;
        align-items: center;
        right: 40px;
        bottom: 50px;
        list-style: none;
        padding: 20px;
        font-size: 50px;
        width: 50px;
        text-decoration: none;
        border-radius: 50%;
    }
    
    .text {
        text-align: center;
        color: white;
    }
    
    .head5 {
        color: #FBAD30;
        font-size: 3rem;
        font-weight: bold;
    }
</style>
<br><br>
<h1 class="text"> <span> Welcome in </span> <span class="head5">Quiz</span> <span class="head6">Exam</span></h1>
<br><br><br><br>
<div class="content-section col-md-10 col-md-offset-2 form" style=" position: relative; left: 10%;">
    <h3 style="margin: auto; text-align:center;">Registration Form</h3>
    <form method="POST" style="border: 1px solid black; margin: 4%; padding:10%; border-radius:1%;">
        {% csrf_token %}
        <fieldset class="form-group ">
            {{ form|crispy}}
        </fieldset>
        <center>
            <button class="btn btn-outline-info button" type="submit"><span class="glyphicon glyphicon-check"></span> &nbsp; sign up</button>
        </center>
        <br />
        <sub><a href="{% url 'login' %}" style="text-decoration: none; color: blue; padding:3% ; cursor:pointer; font-size: 15px;">Already have an account ?</a></sub>
    </form>
</div>
{% endblock start %}
<hr color="black">
<footer class="copy">
    <p style="color: white;">Copyright &copy;2021 Quiz Exam All rights are reserved</p>
    <div class="icon">
        <ul>
            <li>
                <a href="https://www.facebook.com/profile.php?id=100073352633961" target="_blank" class="fa fa-facebook"></a>
            </li>
            <li>
                <a href="https://instagram.com/quiz_exam_?utm_medium=copy_link" target="_blank" class="fa fa-instagram "></a>
            </li>
            <li>
                <a href="https://twitter.com/QuizExams" target="_blank " class="fa fa-twitter "></a>
            </li>
            <li>
                <a href="https://youtube.com/channel/UCqzXoXGDaOHLYShkr-BORyQ" target="_blank " class="fa fa-youtube "></a>
            </li>
            <li>
                <a href="https://www.google.com" target="_blank " class="fa fa-google "></a>
            </li>
        </ul>
    </div>

</footer>
<div class="icon-bar">
    <a href="/contact"><button class="btn btn-primary"> Help</button></a>
</div>
<div class="icon-bars">
    <a><button class="btn btn-primary" onclick="functionAlerts()"> Alert</button></a>
</div>
